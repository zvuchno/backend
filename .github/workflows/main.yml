name: Main Zvuchno workflow

concurrency:
  group: deploy
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:

  build_and_push_to_docker_hub:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/zvuchno_backend:latest

  build_gateway_and_push_to_docker_hub:
    name: Push gateway Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./nginx/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/zvuchno_gateway:latest

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build_and_push_to_docker_hub
      - build_gateway_and_push_to_docker_hub
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    - name: Copy docker-compose.production.yml via ssh
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: "docker-compose.production.yml"
        target: "zvuchno"
    - name: Executing remote ssh commands to deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # Определяем ID пользователя
          CUR_UID=$(id -u)
          CUR_GID=$(id -g)

          # Указываем путь к сокету Докера
          export DOCKER_HOST=unix:///run/user/$CUR_UID/docker.sock

          cd zvuchno

          # Проверяем наличие UID/GID в .env, если их нет — записываем
          grep -qq "^UID=" .env || echo "UID=$(id -u)" >> .env
          grep -qq "^GID=" .env || echo "GID=$(id -g)" >> .env

          echo "=== BEFORE ==="
          docker images --digests | grep zvuchno || true

          docker compose -f docker-compose.production.yml pull

          echo "=== AFTER ==="
          docker images --digests | grep zvuchno || true

          docker compose -f docker-compose.production.yml up -d --wait

          docker image prune -f

          echo "Исправляем владельца волюмов на $CUR_UID:$CUR_GID..."
          docker run --rm \
            -v zvuchno_static:/fix_static \
            -v zvuchno_media:/fix_media \
            alpine chown -R $CUR_UID:$CUR_GID /fix_static /fix_media

          docker compose -f docker-compose.production.yml exec backend python manage.py migrate --noinput
          docker compose -f docker-compose.production.yml exec backend python manage.py collectstatic --noinput
