volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:17.5
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  redis:
    image: redis:7
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: .
    env_file: .env
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static:/app/staticfiles
      - media:/app/media/
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_healthy
  celery_worker:
    build: .
    env_file: .env
    command: celery -A config worker -l warning
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  celery_beat:
    build: .
    env_file: .env
    command: celery -A config beat -l warning
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  gateway:
    build: ./nginx/
    env_file: .env
    volumes:
      - static:/staticfiles
      - media:/media/
    depends_on:
      - backend
    ports:
      - 8000:80
